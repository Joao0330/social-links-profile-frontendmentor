<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />

		<style type="text/tailwindcss">
			@theme {
				--color-green: hsl(75, 94%, 57%);
				--color-white: hsl(0, 0%, 100%);
				--color-grey-700: hsl(0, 0%, 20%);
				--color-grey-800: hsl(0, 0%, 12%);
				--color-grey-900: hsl(0, 0%, 8%);

				--font-inter: 'Inter', sans-serif;
			}
		</style>

		<title>Frontend Mentor | Social links profile</title>
	</head>
	<body class="font-inter text-[0.875rem] bg-grey-900 text-white">
		<main>
			<div class="min-h-screen py-0 px-4 flex items-center justify-center">
				<article class="p-6 md:p-10 bg-grey-800 rounded-xl flex flex-col items-center gap-6 text-center">
					<div class="flex flex-col gap-6">
						<address class="flex flex-col gap-6 items-center">
							<img src="./assets/images/avatar-jessica.jpeg" alt="jessica Randall - avatar image" class="w-22 h-auto rounded-full" />
							<div class="flex flex-col gap-1">
								<h2 class="text-2xl not-italic font-semibold">Jessica Randall</h2>
								<p class="font-bold text-green not-italic">London, United Kingdom</p>
							</div>
						</address>

						<p class="px-3 md:px-5 min-[90rem]:px-6">"Front-end developer and avid reader"</p>
					</div>

					<nav class="w-full">
						<ul class="flex flex-col gap-4">
							<li>
								<a href="#" class="min-[90rem]:transition-colors min-[90rem]:duration-300 block bg-grey-700 p-3 rounded-lg font-semibold min-[90rem]:hover:bg-green min-[90rem]:hover:text-grey-700"
									>Github</a
								>
							</li>
							<li>
								<a href="#" class="min-[90rem]:transition-colors min-[90rem]:duration-300 block bg-grey-700 p-3 rounded-lg font-semibold min-[90rem]:hover:bg-green min-[90rem]:hover:text-grey-700"
									>Frontend Mentor</a
								>
							</li>
							<li>
								<a href="#" class="min-[90rem]:transition-colors min-[90rem]:duration-300 block bg-grey-700 p-3 rounded-lg font-semibold min-[90rem]:hover:bg-green min-[90rem]:hover:text-grey-700"
									>LinkedIn</a
								>
							</li>
							<li>
								<a href="#" class="min-[90rem]:transition-colors min-[90rem]:duration-300 block bg-grey-700 p-3 rounded-lg font-semibold min-[90rem]:hover:bg-green min-[90rem]:hover:text-grey-700"
									>Twitter</a
								>
							</li>
							<li>
								<a href="#" class="min-[90rem]:transition-colors min-[90rem]:duration-300 block bg-grey-700 p-3 rounded-lg font-semibold min-[90rem]:hover:bg-green min-[90rem]:hover:text-grey-700"
									>Instagram</a
								>
							</li>
						</ul>
					</nav>
				</article>
			</div>
		</main>

		<footer class="max-w-[75rem] my-0 mx-auto py-[2rem] px-[1rem] text-center">
			<p>
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge" class="text-green" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)"
					>Frontend Mentor <span class="absolute w-[0.063rem] h-[0.063rem] p-0 -m-[0.063rem] overflow-hidden [clip:rect(0,0,0,0)] whitespace-nowrap border-0">(opens in a new tab)</span> </a
				>. Coded by <a href="#" class="text-green">João Rodrigues</a>.
			</p>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</body>
</html>
